name: Build and Release
permissions:
  actions: read
  contents: write
  security-events: write
  id-token: write
on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
jobs:
  build:
    name: Build Source Transition Manager
    runs-on: windows-latest
    environment: release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          install-deps: 'true'
      - name: Configure and Build
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Plugin
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: feeds-signing
          certificate-profile-name: feeds-signing
          files-folder: ${{ github.workspace }}\build\Release
          files-folder-filter: source-transition-manager.dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Assemble Drop-in ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/obs-plugins/64bit"
          Copy-Item "build/Release/source-transition-manager.dll" -Destination "dist/obs-plugins/64bit/"
          Copy-Item "build/Release/source-transition-manager.pdb" -Destination "dist/obs-plugins/64bit/"
          New-Item -ItemType Directory -Force -Path "dist/data/obs-plugins/source-transition-manager/locale"
          Copy-Item "data/locale/en-US.ini" -Destination "dist/data/obs-plugins/source-transition-manager/locale/"
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/*" -DestinationPath "SourceTransitionManager-${{ github.ref_name }}-windows-x64.zip"
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build Installer
        shell: cmd
        run: |
          copy LICENSE installer\LICENSE
          "C:\Program Files (x86)\NSIS\makensis.exe" /DROOT_DIR="%CD%" installer\source-transition-manager-installer.nsi
          move installer\SourceTransitionManager-Setup.exe SourceTransitionManager-${{ github.ref_name }}-Setup.exe
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SourceTransitionManager-${{ github.ref_name }}
          path: |
            SourceTransitionManager-*-windows-x64.zip
            SourceTransitionManager-*-Setup.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: SourceTransitionManager-${{ github.ref_name }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SourceTransitionManager-*-windows-x64.zip
            SourceTransitionManager-*-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
